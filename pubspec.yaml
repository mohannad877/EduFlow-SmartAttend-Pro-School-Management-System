name: school_schedule_app
description: "نظام إدارة الجداول الدراسية - Enterprise School Management System"
publish_to: 'none'

version: 2.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── State Management ────────────────────────────────────────────────────────
  flutter_bloc: ^9.1.1
  flutter_riverpod: ^2.6.1
  equatable: ^2.0.7
  rxdart: ^0.28.0

  # ── Dependency Injection ────────────────────────────────────────────────────
  get_it: ^8.0.3
  injectable: ^2.5.0

  # ── Database (Drift / SQLite) ───────────────────────────────────────────────
  drift: ^2.23.1
  path_provider: ^2.1.5
  sqlite3_flutter_libs: ^0.5.30


  # ── PDF & Printing ──────────────────────────────────────────────────────────
  pdf: ^3.11.3
  printing: ^5.14.2

  # ── Excel Export ────────────────────────────────────────────────────────────
  excel: ^4.0.6

  # ── CSV Export ──────────────────────────────────────────────────────────────
  csv: ^6.0.0

  # ── File Handling ───────────────────────────────────────────────────────────
  file_picker: ^8.3.7
  open_file: ^3.5.10
  share_plus: ^10.1.4

  # ── Barcode / QR ────────────────────────────────────────────────────────────
  mobile_scanner: ^5.2.3
  qr_flutter: ^4.1.0

  # ── Charts ──────────────────────────────────────────────────────────────────
  fl_chart: ^0.68.0

  # ── Animations ──────────────────────────────────────────────────────────────
  flutter_animate: ^4.5.0

  # ── Web / URL ────────────────────────────────────────────────────────────────
  webview_flutter: ^4.10.0
  url_launcher: ^6.3.1

  # ── Storage & Preferences ───────────────────────────────────────────────────
  shared_preferences: ^2.3.5

  # ── Utilities ───────────────────────────────────────────────────────────────
  uuid: ^4.5.1
  intl: ^0.19.0
  crypto: ^3.0.6
  timeago: ^3.7.0
  path: ^1.9.0
  meta: ^1.11.0
  flutter_local_notifications: ^19.5.0
  workmanager: ^0.9.0+3
  timezone: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # ── Code Generation ─────────────────────────────────────────────────────────
  build_runner: ^2.4.13
  injectable_generator: ^2.6.2
  drift_dev: ^2.20.3
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
